spring.application.name=Library-Management-System

# Database connection URL (adjust database name if needed)
spring.datasource.url=jdbc:mysql://localhost:3307/lms?useSSL=false

# MySQL username
spring.datasource.username=root

# MySQL password
spring.datasource.password=root

# JDBC driver for MySQL 8+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Dialect for MySQL 8
#Hibernate Dialect tells Hibernate how to translate your Java code into the correct
SQL for that specific database.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Automatically update database schema based on JPA entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (useful for debugging)
spring.jpa.show-sql=true

logging.level.org.hibernate.sql=DEBUG