<div class="row justify-content-center mt-2">
	<div class="col-md-10 col-lg-8">
		<div class="card shadow border-0" style="border-radius: 15px;">
			<div class="card-body p-4">

				<h3 class="mb-4 text-dark font-weight-bold">
					<i class="bi bi-file-earmark-plus text-success"></i> Add New Book
				</h3>

				<form action="/save-book" method="post">
					<div class="mb-3">
						<label class="form-label fw-semibold">Book Title</label>
						<input type="text" class="form-control" name="title" placeholder="Enter book title" required>
					</div>

					<div class="mb-3">
						<label class="form-label fw-semibold">Author</label>
						<input type="text" class="form-control" name="author" placeholder="Enter author name" required>
					</div>

					<div class="mb-3">
						<label class="form-label fw-semibold">Category</label>
						<input type="text" class="form-control" name="category" placeholder="e.g., Fiction, Computer Science" required>
					</div>

					<div class="row g-3">
						<div class="col-md-6">
							<label class="form-label fw-semibold">Price</label>
							<div class="input-group">
								<span class="input-group-text">Rs.</span>
								<input type="number" step="0.01" class="form-control" name="price" placeholder="0.00" required>
							</div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-semibold">Quantity</label>
							<input type="number" class="form-control" name="quantity" placeholder="Available copies" required>
						</div>
					</div>

					<div class="row mt-4 g-2">
						<div class="col-sm-6">
							<button type="submit" class="btn btn-success w-100 py-2">
								<i class="bi bi-plus-circle"></i> Save Book
							</button>
						</div>
						<div class="col-sm-6">
							<button type="button" class="btn btn-outline-secondary w-100 py-2" onclick="document.getElementById('btn-dashboard').click();">
								<i class="bi bi-arrow-left"></i> Back to Dashboard
							</button>
						</div>
					</div>
				</form>

			</div>
		</div>
	</div>
</div>
