<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
	font-family: 'Inter', sans-serif;
	margin: 0;
	background: #f4f6f9;
	color: #333;
}

/* Sidebar Styling */
.sidebar {
	height: 100vh;
	width: 260px;
	position: fixed;
	background: linear-gradient(185deg, #4e73df 0%, #224abe 100%);
	color: white;
	padding-top: 25px;
	z-index: 100;
	box-shadow: 4px 0 10px rgba(0,0,0,0.05);
}

.sidebar .brand {
	font-size: 22px;
	font-weight: 700;
	text-align: center;
	margin-bottom: 35px;
	letter-spacing: 0.5px;
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 10px;
}

.sidebar a {
	color: rgba(255, 255, 255, 0.8);
	padding: 14px 24px;
	display: flex;
	align-items: center;
	gap: 12px;
	text-decoration: none;
	font-weight: 500;
	transition: all 0.2s ease-in-out;
	border-left: 4px solid transparent;
	cursor: pointer;
}

.sidebar a:hover, .sidebar a.active-link {
	color: #fff;
	background: rgba(255, 255, 255, 0.15);
	border-left-color: #1cc88a;
}

/* Main Content Wrapper */
.main-content {
	margin-left: 260px;
	min-height: 100vh;
}

/* Topbar Styling */
.topbar {
	background: white;
	padding: 15px 30px;
	box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
	border-bottom: 1px solid #eef2f5;
}

/* Eye-Catching Analytics Dash Component Styles */
.stat-card {
	border: none;
	border-radius: 16px;
	transition: transform 0.2s ease, box-shadow 0.2s ease;
	background: #fff;
}

.stat-card:hover {
	transform: translateY(-4px);
	box-shadow: 0 10px 20px rgba(0,0,0,0.05) !important;
}

.icon-shape {
	width: 54px;
	height: 54px;
	border-radius: 12px;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 24px;
}

.bg-light-primary { background: rgba(78, 115, 223, 0.1); color: #4e73df; }
.bg-light-success { background: rgba(28, 200, 138, 0.1); color: #1cc88a; }
.bg-light-warning { background: rgba(246, 194, 62, 0.1); color: #f6c23e; }
.bg-light-info { background: rgba(54, 185, 204, 0.1); color: #36b9cc; }

.quick-action-btn {
	border: 1px solid #e3e6f0;
	border-radius: 12px;
	padding: 15px;
	text-align: center;
	background: white;
	transition: all 0.2s;
	cursor: pointer;
}
.quick-action-btn:hover {
	background: #4e73df;
	color: white !important;
	border-color: #4e73df;
}
</style>

</head>

<body>

	<div class="sidebar">
		<div class="brand">
			<i class="bi bi-book-half text-warning"></i>
			<span>LMS Portal</span>
		</div>
		<a href="javascript:void(0);" id="btn-dashboard" class="active-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
		<a href="#"><i class="bi bi-person-fill"></i> Profile</a> 
		<a href="javascript:void(0);" class="menu-link" data-url="/add-book"><i class="bi bi-plus-circle-fill"></i> Add Book</a> 
		<a href="javascript:void(0);" class="menu-link" data-url="/list-books"><i class="bi bi-collection-fill"></i> List Book</a>
	</div>

	<div class="main-content">
		<div class="topbar d-flex justify-content-between align-items-center">
			<div>
				<h5 class="mb-0 fw-bold text-dark">Welcome Back, <span th:text="${username}" class="text-primary">User</span>!</h5>
			</div>
			<a href="/logout" class="btn btn-outline-danger btn-sm px-3 fw-medium rounded-pill">
				<i class="bi bi-box-arrow-right me-1"></i> Logout
			</a>
		</div>

		<div class="container-fluid p-4" id="content-area">
			
			<div id="dashboard-view-fragment">
				
				<div class="row mb-4">
					<div class="col-12">
						<div class="p-4 bg-white rounded-4 shadow-sm border-0 d-flex align-items-center justify-content-between" style="border-left: 5px solid #4e73df !important;">
							<div>
								<h4 class="fw-bold text-dark mb-1">Library Management System Control Overview</h4>
							</div>
							<i class="bi bi-speedometer2 text-muted display-6 d-none d-md-block opacity-50"></i>
						</div>
					</div>
				</div>

				<div class="row g-4 mb-4">
					<div class="col-xl-3 col-sm-6">
						<div class="card stat-card shadow-sm p-3">
							<div class="d-flex align-items-center justify-content-between">
								<div>
									<span class="text-muted small fw-semibold text-uppercase tracking-wider">Total Books</span>
									<h3 class="fw-bold text-dark mb-0 mt-1" th:text="${totalBooks}">0</h3>
								</div>
								<div class="icon-shape bg-light-primary"><i class="bi bi-journal-bookmark-fill"></i></div>
							</div>
						</div>
					</div>

					<div class="col-xl-3 col-sm-6">
						<div class="card stat-card shadow-sm p-3">
							<div class="d-flex align-items-center justify-content-between">
								<div>
									<span class="text-muted small fw-semibold text-uppercase">Categories</span>
									<h3 class="fw-bold text-dark mb-0 mt-1" th:text="${totalCategories}">0</h3>
								</div>
								<div class="icon-shape bg-light-success"><i class="bi bi-tags-fill"></i></div>
							</div>
						</div>
					</div>

					<div class="col-xl-3 col-sm-6">
						<div class="card stat-card shadow-sm p-3">
							<div class="d-flex align-items-center justify-content-between">
								<div>
									<span class="text-muted small fw-semibold text-uppercase">Active Members</span>
									<h3 class="fw-bold text-dark mb-0 mt-1" th:text="${totalMembers}">0</h3>
								</div>
								<div class="icon-shape bg-light-info"><i class="bi bi-people-fill"></i></div>
							</div>
						</div>
					</div>
				</div>

				<div class="row g-4">
					<div class="col-lg-12">
						<div class="card border-0 shadow-sm p-4 rounded-4 bg-white h-100">
							<h6 class="fw-bold text-dark mb-3"><i class="bi bi-lightning-charge-fill text-warning me-2"></i>Quick Administration Actions</h6>
							<div class="row g-3">
								<div class="col-6">
									<div class="quick-action-btn text-primary fw-medium" onclick="document.querySelector('[data-url=\'/add-book\']').click();">
										<i class="bi bi-file-earmark-plus display-6 d-block mb-2"></i> New Catalog Entry
									</div>
								</div>
								<div class="col-6">
									<div class="quick-action-btn text-success fw-medium" onclick="document.querySelector('[data-url=\'/list-books\']').click();">
										<i class="bi bi-card-list display-6 d-block mb-2"></i> View Inventory
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>

			</div>
		</div>
	</div>

	<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
		<div id="liveToast" class="toast align-items-center text-white bg-success border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
			<div class="d-flex">
				<div class="toast-body d-flex align-items-center">
					<i class="bi bi-check-circle-fill me-2 fs-5"></i>
					<span id="toast-message">Action completed successfully!</span>
				</div>
				<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		const contentArea = document.getElementById('content-area');
		const sidebarLinks = document.querySelectorAll('.sidebar a');

		// Function to update sidebar active highlight styles state manually
		function updateSidebarHighlight(targetElement) {
			sidebarLinks.forEach(link => link.classList.remove('active-link'));
			if(targetElement) {
				targetElement.classList.add('active-link');
			}
		}

		// Function to show custom Toast alerts
		function showToastNotification(message, isSuccess = true) {
			const toastEl = document.getElementById('liveToast');
			const toastMsg = document.getElementById('toast-message');
			
			toastMsg.textContent = message;
			if(!isSuccess) {
				toastEl.classList.remove('bg-success');
				toastEl.classList.add('bg-danger');
			} else {
				toastEl.classList.remove('bg-danger');
				toastEl.classList.add('bg-success');
			}
			
			const bsToast = new bootstrap.Toast(toastEl);
			bsToast.show();
		}

		// GLOBAL FUNCTION: Handles confirmations and processes delete asynchronously
		function confirmDashboardDelete(btn) {
			let targetBookId = btn.getAttribute("data-id");
			if (confirm("Are you sure you want to delete this book?")) {
				fetch("/delete-book/" + targetBookId)
					.then(response => response.text())
					.then(data => {
						showToastNotification("Book deleted successfully 🗑️");
						loadDynamicView("/list-books"); 
					})
					.catch(err => console.error(err));
			}
		}

		// Function to load fragments asynchronously
		function loadDynamicView(url) {
			fetch(url, {
				headers: { "X-Requested-With": "XMLHttpRequest" }
			})
				.then(response => {
					if (response.redirected) {
						window.location.href = response.url;
						return;
					}
					if (!response.ok) throw new Error("Network response error");
					return response.text();
				})
				.then(html => {
					if (html) {
						contentArea.innerHTML = html;
						attachDynamicListeners();
					}
				})
				.catch(error => {
					console.error('AJAX Error:', error);
					contentArea.innerHTML = `<div class="alert alert-danger mt-4">Failed to load content layout. Please try again.</div>`;
				});
		}

		// Intercept Sidebar Links Clicks
		document.querySelectorAll('.menu-link').forEach(link => {
			link.addEventListener('click', function(e) {
				e.preventDefault();
				updateSidebarHighlight(this);
				loadDynamicView(this.getAttribute('data-url'));
			});
		});

		// FIXED: Dashboard side button now pulls live data records asynchronously on every click!
		document.getElementById('btn-dashboard').addEventListener('click', function() {
			updateSidebarHighlight(this);
			loadDynamicView("/dashboard");
		});

		// Monitor forms and updates injected dynamic data templates
		function attachDynamicListeners() {
			const internalForm = contentArea.querySelector('form');
			if (internalForm) {
				internalForm.addEventListener('submit', function(e) {
					e.preventDefault();
					
					const formData = new FormData(this);
					const targetAction = this.getAttribute('action');
					
					fetch(targetAction, {
						method: 'POST',
						body: formData
					})
					.then(response => response.text())
					.then(data => {
						if (data.includes("SAVED_SUCCESS")) {
							showToastNotification("Book added successfully 📚");
							this.reset();
						} else if (data.includes("UPDATED_SUCCESS")) {
							showToastNotification("Book updated successfully ✅");
							updateSidebarHighlight(document.querySelector('[data-url="/list-books"]'));
							loadDynamicView("/list-books"); 
						} else {
							contentArea.innerHTML = data;
							attachDynamicListeners();
						}
					})
					.catch(err => console.error("Form Processing Exception:", err));
				});
			}

			// Monitor Action Table Clicks (Edit links)
			contentArea.querySelectorAll('a').forEach(anchor => {
				const linkPath = anchor.getAttribute('href');
				if (linkPath && linkPath.includes('/edit-book/')) {
					anchor.addEventListener('click', function(e) {
						e.preventDefault();
						loadDynamicView(linkPath);
					});
				}
			});
		}
	</script>
</body>
</html>
