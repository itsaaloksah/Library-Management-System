<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Edit Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:linear-gradient(135deg,#4e73df,#1cc88a);">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-body">

<h3>Edit Book</h3>

<form action="/update-book" method="post">

<input type="hidden"
       name="id"
       th:value="${book.id}">

<div class="mb-3">
<input class="form-control"
       name="title"
       th:value="${book.title}">
</div>

<div class="mb-3">
<input class="form-control"
       name="author"
       th:value="${book.author}">
</div>

<div class="mb-3">
<input class="form-control"
       name="category"
       th:value="${book.category}">
</div>

<div class="mb-3">
<input class="form-control"
       name="price"
       th:value="${book.price}">
</div>

<div class="mb-3">
<input class="form-control"
       name="quantity"
       th:value="${book.quantity}">
</div>

<div class="d-flex gap-2">

<button class="btn btn-success">
Save Changes
</button>

<a href="/list-books"
   class="btn btn-secondary">

Back

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
