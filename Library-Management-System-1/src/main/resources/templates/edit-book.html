<div class="row justify-content-center mt-2">
    <div class="col-md-10 col-lg-8">
        <div class="card shadow border-0" style="border-radius: 15px;">
            <div class="card-body p-4">

                <h3 class="mb-4 text-dark font-weight-bold">
                    <i class="bi bi-pencil-square text-warning"></i> Edit Book Details
                </h3>

                <form action="/update-book" method="post">
                    <input type="hidden" name="id" th:value="${book.id}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Book Title</label>
                        <input type="text" class="form-control" name="title" th:value="${book.title}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Author</label>
                        <input type="text" class="form-control" name="author" th:value="${book.author}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <input type="text" class="form-control" name="category" th:value="${book.category}" required>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Price</label>
                            <div class="input-group">
                                <span class="input-group-text">Rs.</span>
                                <input type="number" step="0.01" class="form-control" name="price" th:value="${book.price}" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Quantity</label>
                            <input type="number" class="form-control" name="quantity" th:value="${book.quantity}" required>
                        </div>
                    </div>

                    <div class="row g-2">
                        <div class="col-sm-6">
                            <button type="submit" class="btn btn-success w-100 py-2">
                                <i class="bi bi-check-lg"></i> Save Changes
                            </button>
                        </div>
                        <div class="col-sm-6">
                            <button type="button" class="btn btn-secondary w-100 py-2" onclick="loadDynamicView('/list-books')">
                                <i class="bi bi-x-circle"></i> Cancel
                            </button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
