<div class="row mt-2">
    <div class="col-12">
        <div class="card shadow border-0" style="border-radius: 15px;">
            <div class="card-body p-4">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="text-dark font-weight-bold mb-0">
                        <i class="bi bi-card-list text-primary"></i> Book Catalog List
                    </h3>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th style="width: 180px; text-align: center;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="book : ${books}">
                                <td th:text="${book.id}" class="text-secondary fw-bold"></td>
                                <td th:text="${book.title}" class="fw-semibold"></td>
                                <td th:text="${book.author}"></td>
                                <td><span class="badge bg-light text-dark border" th:text="${book.category}"></span></td>
                                <td th:text="'Rs. ' + ${book.price}"></td>
                                <td th:text="${book.quantity}"></td>
                                <td>
                                    <div class="d-flex gap-2 justify-content-center">
                                        <a th:href="@{/edit-book/{id}(id=${book.id})}" class="btn btn-warning btn-sm px-3">
                                            <i class="bi bi-pencil-square"></i> Edit
                                        </a>
                                        <button class="btn btn-danger btn-sm px-3" th:attr="data-id=${book.id}" onclick="confirmDashboardDelete(this)">
                                            <i class="bi bi-trash"></i> Delete
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(books)}">
                                <td colspan="7" class="text-center py-4 text-muted">No books found in catalog database.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>
